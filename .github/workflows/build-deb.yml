name: Build DEB Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libfreetype6-dev \
          libportmidi-dev \
          libjpeg-dev \
          dpkg-dev
    
    - name: Create virtual environment and install dependencies
      run: |
        python3 -m venv venv
        venv/bin/pip install --upgrade pip
        venv/bin/pip install -r requirements.txt
        venv/bin/pip install pyinstaller
    
    - name: Build DEB package
      run: |
        chmod +x build_deb.sh
        ./build_deb.sh
    
    - name: Get package info
      id: package
      run: |
        PKG_NAME=$(ls *.deb | head -n 1)
        echo "name=$PKG_NAME" >> $GITHUB_OUTPUT
        echo "Package: $PKG_NAME"
        
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      with:
        files: "*.deb"
        tag_name: ${{ github.ref_name }}
        name: "Solitario Klondike v${{ steps.package.outputs.version }}"
        body: |
          ## 🎮 Solitario Klondike v${{ steps.package.outputs.version }}
          
          ### 📦 Instalación en Debian/Ubuntu
          
          ```bash
          # Descargar el .deb y luego:
          sudo dpkg -i ${{ steps.package.outputs.name }}
          ```
          
          ### 🗑️ Desinstalación
          
          ```bash
          sudo apt remove solitario-klondike
          ```
          
          ### ✨ Características
          
          - Juego completo de Solitario Klondike
          - 5 niveles de dificultad
          - 3 temas visuales personalizables
          - Reverso de carta personalizable (PNG, JPG, JPEG, BMP)
          - Auto-resolver cuando todas las cartas están visibles
          - Doble clic para mover cartas automáticamente
          - Deshacer movimientos (Ctrl+Z)
          - Guardado automático
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
